[package]
name = "stock-trek"
version = "0.3.1"
edition = "2021"
description = "Stock Trek time-series analysis"
authors = ["stock-trek.com <stock-trek@proton.me>"]
license = "MIT"
repository = "https://github.com/Stock-Trek/PublicAPI"
readme = "README.md"
categories = ["finance", "mathematics"]
keywords = [
  "indicators",
  "ohlcv",
  "statistics",
  "timeseries",
]

[lib]
name = "stock_trek"
crate-type = ["cdylib", "rlib"]

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
larpa = "0.1.1"
num-complex = "0.4.6"
proc-macro2 = { version = "1.0.106", features = ["span-locations"] }
quote = "1.0.45"
rand = "0.10.0"
rust_decimal = "1.40"
serde = "1.0.228"
strum = { version = "0.28.0", features = ["derive"] }
syn = { version = "2.0.117", features = ["visit"] }
thiserror = "1.0"
traitreg = "0.4.0"
typify = "0.6.1"
uuid = { version = "1.23.0", features = ["serde"] }
