name: Test and tag

on:
  push:
    branches: [master]

jobs:
  test-and-tag:
    name: Test and tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-tags: true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run checks
        run: |
          cargo fmt --check
          cargo clippy
          cargo test

      - name: Get version, check if tag exists, create if not
        run: |
          VERSION=$(cargo pkgid | sed 's|.*#||; s|.*:||; s|^v||')
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists"
          else
            echo "Creating tag ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
