name: Test and tag

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  test-and-tag:
    name: Test and tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-tags: true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run checks
        run: |
          cargo fmt --check
          cargo clippy
          cargo test

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.PUSH_TAG_PAT }}
        run: |
          VERSION=$(cargo pkgid | rev | cut -d '@' -f 1 | cut -d '#' -f 1 | rev)
          TAG="v${VERSION}"
          if gh release view "${TAG}" &>/dev/null; then
            echo "Tag ${TAG} already exists"
          else
            echo "Creating tag ${TAG}"
            gh release create "${TAG}" --generate-notes --target "${GITHUB_SHA}"
          fi
