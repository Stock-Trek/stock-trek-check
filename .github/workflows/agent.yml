name: Agent

on:
  issues:
    types: [edited, opened, reopened]
  issue_comment:
    types: [created, edited]

jobs:
  triage:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.title, '@agent') || contains(github.event.issue.body, '@agent'))) ||
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@agent')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    outputs:
      issue-branch-base: ${{ steps.gather-branches.outputs.issue-branch-base }}
      issue-branch: ${{ steps.gather-branches.outputs.issue-branch }}
      issue-context-base64: ${{ steps.gather-context.outputs.context-base64 }}
      request-type: ${{ steps.save-request-type.outputs.request-type }}
    env:
      GITHUB_TOKEN: ${{ secrets.RAISE_PR_PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Acknowledge
        uses: ./.github/actions/emoji-react
        with:
          comment-id: ${{ github.event.comment.id }}
          issue-number: ${{ github.event.issue.number }}
          reaction: 'eyes'
          token: ${{ secrets.ISSUE_READ_WRITE }}

      - name: Gather issue branches
        id: gather-branches
        uses: ./.github/actions/gather-issue-branches
        with:
          issue-number: ${{ github.event.issue.number }}
          issue-branch-base: master

      - name: Get last 20 comments
        id: gather-context
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 20
            });
            const last20Comments = comments.slice(-20);
            const history = last20Comments.map(comment => ({
              author: comment.user.login,
              date: comment.created_at,
              body: comment.body,
            }));
            const issueContext = {
              title: issue.title,
              body: issue.body,
              history
            };
            console.log(issueContext);
            const stringified = JSON.stringify(issueContext);
            const context_base64 = Buffer.from(stringified).toString('base64');
            core.setOutput('context-base64', context_base64);

      - name: Set up DeepSeek via pi
        uses: ./.github/actions/set-up-deepseek-via-pi
        with:
          api-key: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Create pi inputs for classifying request
        id: pi-inputs-request
        run: |
          PROMPT_BASE64=$(cat .github/dialogues/prompts/classify-request.txt | base64 -w 0)
          SCHEMA_BASE64=$(cat .github/dialogues/responses/request-schema.json | jq -c | base64 -w 0)
          echo "prompt-base64=${PROMPT_BASE64}" >> $GITHUB_OUTPUT
          echo "schema-base64=${SCHEMA_BASE64}" >> $GITHUB_OUTPUT

      - name: Classify request
        id: classify-request
        uses: ./.github/actions/invoke-pi
        with:
          context-base64: ${{ steps.gather-context.outputs.context-base64 }}
          prompt-base64: ${{ steps.pi-inputs-request.outputs.prompt-base64 }}
          schema-base64: ${{ steps.pi-inputs-request.outputs.schema-base64 }}

      - name: Save request type
        id: save-request-type
        run: |
          PI_RESPONSE=$(echo "${{ steps.classify-request.outputs.response-base64 }}" | base64 -d | jq .)
          REQUEST_TYPE=$(jq -r '.requestType' <<< "${PI_RESPONSE}")
          echo "request-type: ${REQUEST_TYPE}"
          echo "request-type=${REQUEST_TYPE}" >> $GITHUB_OUTPUT

  thumbs-down-spam:
    needs: [triage]
    if: needs.triage.outputs.request-type == 'SPAM'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Thumbs down
        uses: ./.github/actions/emoji-react
        with:
          comment-id: ${{ github.event.comment.id }}
          issue-number: ${{ github.event.issue.number }}
          reaction: '-1'
          token: ${{ secrets.ISSUE_READ_WRITE }}

  other-request:
    needs: [triage]
    if: needs.triage.outputs.request-type == 'OTHER'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Thumbs down
        uses: ./.github/actions/emoji-react
        with:
          comment-id: ${{ github.event.comment.id }}
          issue-number: ${{ github.event.issue.number }}
          reaction: 'confused'
          token: ${{ secrets.ISSUE_READ_WRITE }}
      - name: Add comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `I'm sorry I wasn't able to understand the issue type. If it's one of [BUG, FEATURE, QUESTION] please mention it specifically.`
            });

  respond:
    needs: [triage]
    if: (needs.triage.outputs.request-type == 'BUG') || (needs.triage.outputs.request-type == 'FEATURE') || (needs.triage.outputs.request-type == 'QUESTION')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.RAISE_PR_PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout issue branch if it exists
        id: checkout-issue-branch
        uses: ./.github/actions/checkout-branch
        with:
          branch: ${{ needs.triage.outputs.issue-branch }}
          base: ${{ needs.triage.outputs.issue-branch-base }}
          create-if-not-exists: false

      - name: Set up DeepSeek via pi
        uses: ./.github/actions/set-up-deepseek-via-pi
        with:
          api-key: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Create pi inputs for classifying response
        id: pi-inputs-response
        run: |
          PROMPT_BASE64=$(cat .github/dialogues/prompts/classify-response.txt | base64 -w 0)
          SCHEMA_BASE64=$(cat .github/dialogues/responses/response-schema.json | jq -c | base64 -w 0)
          echo "prompt-base64=${PROMPT_BASE64}" >> $GITHUB_OUTPUT
          echo "schema-base64=${SCHEMA_BASE64}" >> $GITHUB_OUTPUT

      - name: Classify response
        id: classify-response
        uses: ./.github/actions/invoke-pi
        with:
          context-base64: ${{ needs.triage.outputs.issue-context-base64 }}
          prompt-base64: ${{ steps.pi-inputs-response.outputs.prompt-base64 }}
          schema-base64: ${{ steps.pi-inputs-response.outputs.schema-base64 }}

      - name: Save classify response
        id: save-pi-response-classify
        run: |
          PI_RESPONSE=$(echo ${{ steps.classify-response.outputs.response-base64 }} | base64 -d | jq .)
          RESPONSE_TYPE=$(jq -r '.responseType' <<< "${PI_RESPONSE}")
          CODE_CHANGES_REQUIRED=$(jq -r '.codeChangesRequired' <<< "${PI_RESPONSE}")
          EXTRA_INFORMATION_REQUIRED=$(jq -r '.extraInformationRequired' <<< "${PI_RESPONSE}")
          echo "RESPONSE_TYPE: ${RESPONSE_TYPE}"
          echo "CODE_CHANGES_REQUIRED: ${CODE_CHANGES_REQUIRED}"
          echo "EXTRA_INFORMATION_REQUIRED: ${EXTRA_INFORMATION_REQUIRED}"
          echo "response-type=${RESPONSE_TYPE}" >> $GITHUB_OUTPUT
          echo "code-changes-required=${CODE_CHANGES_REQUIRED}" >> $GITHUB_OUTPUT
          echo "extra-information-required<<EOF" >> $GITHUB_OUTPUT
          echo "${EXTRA_INFORMATION_REQUIRED}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

# Already addressed
      - name: Reply as already addressed
        if: steps.save-pi-response-classify.outputs.response-type == 'ALREADY_ADDRESSED'
        uses: actions/github-script@v7
        with:
          script: |
            let body = `I think this has already been addressed.\nIf it hasn't please add another comment.`;
            if (${{ steps.checkout-issue-branch.outputs.issue-branch-exists }}) {
              body += `\n[The changes I have made can be found here.](https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${{ needs.triage.outputs.issue-branch-base }}...${{ needs.triage.outputs.issue-branch }})`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# Require human
      - name: Require human
        if: steps.save-pi-response-classify.outputs.response-type == 'REQUIRES_HUMAN'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'I'm sorry I cannot address this issue as it requires a human.'
            });

# Ask for more information
      - name: Add confused reaction
        if: steps.save-pi-response-classify.outputs.response-type == 'REQUIRES_MORE_INFORMATION'
        uses: ./.github/actions/emoji-react
        with:
          comment-id: ${{ github.event.comment.id }}
          issue-number: ${{ github.event.issue.number }}
          reaction: 'confused'
          token: ${{ secrets.ISSUE_READ_WRITE }}
      - name: Ask for required information
        if: steps.save-pi-response-classify.outputs.response-type == 'REQUIRES_MORE_INFORMATION'
        uses: actions/github-script@v7
        with:
          script: |
            const extraInfo = ${{ steps.save-pi-response-classify.outputs.extra-information-required }};
            let body = 'The following additional information is required:\n';
            if (Array.isArray(extraInfo)) {
              extraInfo.forEach(item => {
                body += `- ${item}\n`;
              });
            } else if (typeof extraInfo === 'string') {
              body += extraInfo;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

# Respond
      - name: Add thumbs up reaction
        if: steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY'
        uses: ./.github/actions/emoji-react
        with:
          comment-id: ${{ github.event.comment.id }}
          issue-number: ${{ github.event.issue.number }}
          reaction: '+1'
          token: ${{ secrets.ISSUE_READ_WRITE }}
      - name: Ensure issue branch
        if: (steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY') && (steps.save-pi-response-classify.outputs.code-changes-required == 'true')
        uses: ./.github/actions/checkout-branch
        with:
          branch: ${{ needs.triage.outputs.issue-branch }}
          base: ${{ needs.triage.outputs.issue-branch-base }}
          create-if-not-exists: true
      - name: Create pi inputs for addressing issue
        id: pi-inputs-address
        if: steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY'
        run: |
          PROMPT_BASE64=$(cat .github/dialogues/prompts/address-issue.txt | base64 -w 0)
          SCHEMA_BASE64=$(cat .github/dialogues/responses/completed-issue-schema.json | jq -c | base64 -w 0)
          echo "prompt-base64=${PROMPT_BASE64}" >> $GITHUB_OUTPUT
          echo "schema-base64=${SCHEMA_BASE64}" >> $GITHUB_OUTPUT
      - name: Address issue
        id: address-issue
        if: steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY'
        uses: ./.github/actions/invoke-pi
        with:
          context-base64: ${{ needs.triage.outputs.issue-context-base64 }}
          prompt-base64: ${{ steps.pi-inputs-address.outputs.prompt-base64 }}
          schema-base64: ${{ steps.pi-inputs-address.outputs.schema-base64 }}
      - name: Save address response
        id: save-pi-response-address
        if: steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY'
        run: |
          PI_RESPONSE=$(echo "${{ steps.address-issue.outputs.response-base64 }}" | base64 -d | jq .)
          SUMMARY=$(jq -r '.summary' <<< "${PI_RESPONSE}")
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "${SUMMARY}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Reply if no code changes required
        if: (steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY') && (steps.save-pi-response-classify.outputs.code-changes-required == 'false')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "${{ steps.save-pi-response-address.outputs.summary }}"
            });
      - name: Raise PR if code changes required
        id: raise-pr
        if: (steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY') && (steps.save-pi-response-classify.outputs.code-changes-required == 'true')
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RAISE_PR_PAT }}
          commit-message: "Feature branch for ${{ github.event.issue.number }} ${{ github.event.issue.title }}"
          title: "Closes #${{ github.event.issue.number }} ${{ github.event.issue.title }}"
          body: "${{ steps.save-pi-response-address.outputs.summary }}"
          branch: ${{ needs.triage.outputs.issue-branch }}
          base: ${{ needs.triage.outputs.issue-branch-base }}
          delete-branch: true
          draft: false
      - name: Reply with diff and PR link
        if: (steps.save-pi-response-classify.outputs.response-type == 'CAN_ADDRESS_FULLY') && (steps.save-pi-response-classify.outputs.code-changes-required == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const body = 'I have now addressed this.' + '\n' +
                          `[The changes I have made can be found here.](https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${{ needs.triage.outputs.issue-branch-base }}...${{ needs.triage.outputs.issue-branch }})` + '\n' +
                          '[The PR is available here.](${{ steps.raise-pr.outputs.pull-request-url }})';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
